name: Convert Markdown to PDF

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            fonts-noto \
            fonts-noto-core \
            fonts-noto-mono

      - name: Convert Markdown files
        run: |
          mkdir -p pdf-learning

          find . -type f -name "*.md" | while read file; do
            echo "Processing: $file"

            rel="${file#./}"
            pdf="pdf-learning/${rel%.md}.pdf"

            mkdir -p "$(dirname "$pdf")"

            pandoc "$file" \
              --pdf-engine=xelatex \
              -V mainfont="Noto Sans" \
              -V monofont="Noto Sans Mono" \
              -o "$pdf"
          done

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: pdf-learning
          path: pdf-learning
